<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMOS VLSI Design</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020617;
color:#fff;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px 8%;
background:#111827;
position:fixed;
width:100%;
z-index:1000;
}

.logo img{height:40px;}

nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
}

/* HERO */
.hero{
text-align:center;
padding:150px 8% 60px;
background:linear-gradient(to right,#0ea5e9,#020617);
}

/* SECTION */
section{
padding:80px 8%;
}

/* CARDS */
.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:15px;
}

/* BUTTON */
.btn{
display:block;
width:100%;
padding:10px;
margin-top:10px;
background:#38bdf8;
color:#000;
border-radius:6px;
text-align:center;
text-decoration:none;
cursor:pointer;
}

/* LECTURE LIST */
.lecture-list{
display:none;
margin-top:10px;
}

.lecture-item{
background:#020617;
padding:10px;
border-radius:10px;
margin-top:10px;
}

iframe{
width:100%;
height:200px;
border:none;
border-radius:10px;
margin-top:5px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
</div>
<nav>
<a href="#modules">Modules</a>
</nav>
</header>

<section class="hero">
<h1>CMOS VLSI DESIGN</h1>
<p>20EC214 | R Chandru</p>
</section>

<section id="modules">
<h2>Course Modules</h2><br>

<div class="card-container">

<!-- MODULE 1 -->
<div class="card">
<h3>Module I</h3>
<p>MOS Transistor</p>

<a href="https://www.slideshare.net/slideshow/comprehensive-course-on-digital-cmos-vlsi-circuits-and-mos-transistor-technology/286997451" target="_blank" class="btn">
View Slides
</a>

<button class="btn" onclick="toggleLecture('m1')">
Lectures
</button>

<div id="m1" class="lecture-list">

<div class="lecture-item">
<p>Lecture 1: VLSI Design Flow</p>
<iframe src="https://www.youtube.com/embed/je1jmSqln78"></iframe>
</div>

<div class="lecture-item">
<p>Lecture 2: Gajski Y-Chart</p>
<iframe src="https://www.youtube.com/embed/YEyfn7htkd0"></iframe>
</div>

</div>
</div>

<!-- MODULE 2 -->
<div class="card">
<h3>Module II</h3>
<p>CMOS Logic</p>

<a href="https://www.slideshare.net/slideshow/20ec214-cmos-vlsi-design-module-ii-cmos-logic-structures/286997491" target="_blank" class="btn">
View Slides
</a>

<button class="btn" onclick="toggleLecture('m2')">
Lectures
</button>

<div id="m2" class="lecture-list">
<p style="margin-top:10px;">Coming Soon</p>
</div>

</div>

</div>
</section>

<script>
function toggleLecture(id){
let el = document.getElementById(id);

if(el.style.display === "block"){
el.style.display = "none";
}else{
el.style.display = "block";
}
}
</script>

</body>
</html>
